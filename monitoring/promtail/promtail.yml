server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from containers belonging to this Compose project.
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Strip the leading slash from the container name ("/" → "").
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container

      # Expose the Compose service name as a label (api, worker, redis, …).
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

    pipeline_stages:
      # In production (DEBUG=false) the app emits JSON lines via loguru.
      # Extract the "level" field as a label so logs can be filtered by severity.
      # Non-JSON lines (e.g. from Redis / Prometheus) are passed through unchanged.
      - json:
          expressions:
            level: level

      - labels:
          level: